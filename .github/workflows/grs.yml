name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&theme=tokyonight&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: free-website-privacy-policy-generator
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=digitalmalayali&repo=free-website-privacy-policy-generator&theme=tokyonight
          path: profile/privacy-policy-generator.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: linkhub-jekyll-theme
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=digitalmalayali&repo=linkhub-jekyll-theme&theme=tokyonight
          path: profile/linkhub-jekyll-theme.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: unstruction-wordpress-theme
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=digitalmalayalistudio&repo=unstruction-wordpress-theme&theme=tokyonight
          path: profile/unstruction-wordpress-theme.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: sharik
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=marchellodev&repo=sharik&theme=tokyonight
          path: profile/sharik.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: pappadam
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=digitalmalayali&repo=pappadam&theme=tokyonight
          path: profile/pappadam.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Freebies-Hub
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=zcraber&repo=Freebies-Hub&theme=tokyonight
          path: profile/Freebies-Hub.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: powered-by-azuracast
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=zcraber&repo=powered-by-azuracast&theme=tokyonight
          path: profile/powered-by-azuracast.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Justins-Script
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=zcraber&repo=Justins-Script&theme=tokyonight
          path: profile/Justins-Script.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0

          git push
